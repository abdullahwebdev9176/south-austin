<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | Page</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
        integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.carousel.min.css"
        integrity="sha512-tS3S5qG0BlhnQROyJXvNjeEM4UpMXHrQfTGmbQ1gKmelCxlSEBUaxhRBj/EFTzpbP4RVSrpEikbmdJobCvhE3g=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.theme.default.min.css"
        integrity="sha512-sMXtMNL1zRzolHYKEujM2AqCLUR9F2C4/05cdbxjjLSRvMQIciEPCQZo++nk7go3BtSuK9kfa/s+a4f4i5pLkw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>

 <div class="common-header career-header">
        <img src="./assets/images/contact/contact-1.webp" class="page-banner-img positioned-banner" alt="">
    </div>

    <div class="form-sec">

        <div class="form-header text-center mb-4">
            <h3 class="vantage-form-title text-center">Contact The WakeShop</h3>
            <p class="mb-3">For any questions or to place a special order, please contact us via the form, email, or
                give us call.</p>
            <div class="text-center form-contact-box">
                <p>Email: <a href="mailto:katie@southaustinmarine.com">katie@southaustinmarine.com</a></p>
                <ul class="contact-list">
                    <li class="contact-list-item">Call:<a href="tel:+15128922432"> 512-892-2432-212</a></li>
                    <li class="contact-list-item">Text:<a href=""> 512-892-2432</a></li>
                </ul>
            </div>
        </div>
        <div class="common-form-wrapper">

            <div class="form-group">
                <label for="first_name" class="sr-only">First Name*</label>
                <input name="first_name" class="custom-form-control require_check mb-3" placeholder="First Name*"
                    type="text" id="first_name">
                <div class="field-error" id="error_first_name"></div>
            </div>

            <div class="form-group">
                <label for="last_name" class="sr-only">Last Name*</label>
                <input name="last_name" class="custom-form-control require_check mb-3" placeholder="Last Name*"
                    type="text" id="last_name">
                <div class="field-error" id="error_last_name"></div>
            </div>

            <div class="form-group">
                <label for="email" class="sr-only">Email*</label>
                <input name="email" class="custom-form-control require_check mb-3" placeholder="Email*" type="email"
                    id="email">
                <div class="field-error" id="error_email"></div>
            </div>

            <div class="form-group">
                <label for="phone" class="sr-only">Phone*</label>
                <input name="phone" class="custom-form-control require_check mb-3" placeholder="Phone*" type="tel"
                    id="phone">
                <div class="field-error" id="error_phone"></div>
            </div>

            <input type="text" name="honeypot" id="honeypot" style="display: none;">

            <div class="form-group">
                <textarea name="message" id="message" class="custom-textarea mb-3" placeholder="Message"></textarea>
            </div>

            <div class="text-center mt-4">
                <button class="blue-btn">Submit</button>
            </div>

        </div>
    </div>

    <!-- JS Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"
        integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"
        integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"
        integrity="sha384-+sLIOodYLS7CIrQpBjl+C7nPvqq+FbNUBDunl/OZv93DB7Ln/533i8e/mZXLi/P+"
        crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/owl.carousel.min.js"
        integrity="sha512-bPs7Ae6pVvhOSiIcyUClR7/q2OAsRiovw4vAkX+zJbw3ShAeeqezq50RIIcIURq7Oa20rW2n2q+fyXBNcU9lrw=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.min.js"></script>
    <script src="./assets/js/script.js"></script>

</body>

</html>
